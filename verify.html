<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verification</title>
</head>
<body>
  <iframe id="app-frame" src="http://localhost:8080/" style="width:0;height:0;border:0"></iframe>
  <pre id="result">RUNNING</pre>
  <script>
    window.addEventListener('load', () => {
      const frame = document.getElementById('app-frame');
      frame.addEventListener('load', () => {
        const api = frame.contentWindow.piVoiceAppTestApi;
        const output = document.getElementById('result');
        if (!api) {
          output.textContent = 'FAIL: API missing';
          return;
        }

        api.resetProgress();
        const steps = ['3', '1', '4', '9'];
        const results = steps.map((value) => api.submitTranscript(value));
        const state = api.getState();
        const pass = results[0].ok && results[1].ok && results[2].ok && !results[3].ok && state.correctCount === 3 && state.expectedDigit === '1';
        output.textContent = pass ? 'PASS' : 'FAIL: ' + JSON.stringify({ results, state });
      }, { once: true });
    });
  </script>
</body>
</html>
